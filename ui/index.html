<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LifeOS Inventory - Centered & Clean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="inventory-main" class="hidden">
        
        <div class="inventory-panel" id="left-panel">
            <div class="panel-header">CONTENEDOR EXTERNO</div>
            <div class="slots-container" id="secondary-slots">
                </div>
        </div>

        <div id="character-view">
            <div id="ped-container"></div>
        </div>

        <div class="inventory-panel" id="right-panel">
            <div class="panel-header">MOCHILA - <span id="current-weight">0</span>/<span id="max-weight">50</span>kg</div>
            <div class="slots-container" id="main-slots">
                </div>
        </div>

        <div id="inventory-footer">
            <div class="version">LifeOS v1.1 - Minimalist Centered</div>
            <div class="hotkeys-bar">
                <div class="hotkey-slot" data-key="1">1</div>
                <div class="hotkey-slot" data-key="2">2</div>
                <div class="hotkey-slot" data-key="3">3</div>
                <div class="hotkey-slot" data-key="4">4</div>
            </div>
        </div>

        <div id="tooltip" class="hidden"></div>
    </div>

    <div id="lockpick-game">
        <div class="lockpick-target"></div>
        <div class="lockpick-bar"></div>
    </div>

    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
