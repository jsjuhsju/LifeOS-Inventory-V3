<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>LifeOS Inventory V3 - jsjuhsju</title>
</head>
<body>
    <div class="main-wrapper">
        <div class="inventory-container">
            
            <div id="external-panel" class="panel" style="display: none;">
                <div id="station-label" class="header">BAÚL / ARMARIO</div>
                <div class="content">
                    <div id="station-grid" class="inventory-grid">
                        </div>
                </div>
            </div>

            <div class="character-panel">
                <div class="player-preview">
                    <div class="ped-container"></div>
                <div class="property-container">
                    <div class="property-item">
                        <div class="property-info"><span class="prop-title">Vehículo</span><span class="prop-value" id="val-car">Ninguno</span></div>
                    </div>
                    <div class="property-item">
                        <div class="property-info"><span class="prop-title">Propiedad</span><span class="prop-value" id="val-house">Sin Hogar</span></div>
                    </div>
                    <div class="property-item">
                        <div class="property-info"><span class="prop-title">Frecuencia Radio</span><span class="prop-value" id="val-radio">0.0 MHz</span></div>
                    </div>
                </div>
