<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>LifeOS Inventory V3</title>
</head>
<body>
    <div class="main-wrapper">
        <div class="inventory-container">
            
            <div class="dynamic-panel panel">
                <div class="header">INTERACCIÓN</div>
                <div class="content">
                    <div class="placeholder">Panel de Saqueo / Maletero</div>
                </div>
            </div>

            <div class="character-panel">
                <div class="player-preview">
                    <div class="placeholder">Clon 3D (Placeholder)</div>
                </div>
            </div>

            <div class="personal-panel panel">
                <div class="header">INVENTARIO PERSONAL</div>
                
                <div class="grid-section">
                    <div id="pockets-grid" class="inventory-grid">
                        </div>
                </div>

                <div class="equipment-section">
                    <div class="header-small">EQUIPO / USO RÁPIDO</div>
                    <div class="equipment-slots">
                        <div class="slot small clothing" data-slot-type="head">Cabeza</div>
                        <div class="slot small clothing" data-slot-type="torso">Torso</div>
                        <div class="slot small clothing" data-slot-type="backpack">Bolso</div>
                        <div class="slot small clothing" data-slot-type="legs">Piernas</div>
                        <div class="slot small clothing" data-slot-type="feet">Pies</div>
                        
                        <div class="slot small weapon" data-slot-type="fusil" data-hotkey="1">Fusil (1)</div>
                        <div class="slot small weapon" data-slot-type="pistola" data-hotkey="2">Pistola (2)</div>
                        <div class="slot small armor" data-slot-type="chaleco" data-hotkey="3">Chaleco (3)</div>
                        <div class="slot small health" data-slot-type="curacion" data-hotkey="4">Curación (4)</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="hotbar-container">
            <div class="hotbar-slots">
                <div class="hotbar-slot" data-hotkey="1">1</div>
                <div class="hotbar-slot" data-hotkey="2">2</div>
                <div class="hotbar-slot" data-hotkey="3">3</div>
                <div class="hotbar-slot" data-hotkey="4">4</div>
                <div class="hotbar-slot" data-hotkey="5">5</div>
            </div>
        </div>

    </div>
</body>
</html>
